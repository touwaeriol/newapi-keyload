services:
  db:
    image: postgres:16-alpine
    container_name: newapi-keyload-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keyload
      # 密码从同目录 .env 注入（compose 自动加载；.env 已 gitignore，勿提交）
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      - POSTGRES_DB=keyload
      - TZ=Asia/Shanghai
    volumes:
      - keyload-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyload -d keyload"]
      interval: 5s
      timeout: 5s
      retries: 10

  keyload:
    build: .
    image: newapi-keyload:latest
    container_name: newapi-keyload
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # 宿主 3010 → 容器 3000
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      # 连接同一 compose 网络内的 db 服务，密码同样来自 .env
      - DATABASE_URL=postgres://keyload:${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}@db:5432/keyload
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  keyload-pgdata:
