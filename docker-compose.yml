services:
  db:
    image: postgres:16-alpine
    container_name: newapi-keyload-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keyload
      # 内部网络专用库（不暴露宿主端口），密码直接固化，无需 .env
      - POSTGRES_PASSWORD=keyload_pw_2f9x
      - POSTGRES_DB=keyload
      - TZ=Asia/Shanghai
    volumes:
      - keyload-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyload -d keyload"]
      interval: 5s
      timeout: 5s
      retries: 10

  keyload:
    build: .
    image: newapi-keyload:latest
    container_name: newapi-keyload
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # 宿主 3010 → 容器 3000
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      # 连接同一 compose 网络内的 db 服务（无需 .env）
      - DATABASE_URL=postgres://keyload:keyload_pw_2f9x@db:5432/keyload
    healthcheck:
      # 必须用 127.0.0.1 而非 localhost：busybox wget 把 localhost 解析成 ::1(IPv6)，
      # 而 Next 服务只监听 IPv4 → 健康检查恒失败。见 memory: healthcheck-ipv4-localhost。
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  keyload-pgdata:
